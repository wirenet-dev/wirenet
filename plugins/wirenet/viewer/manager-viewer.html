<!DOCTYPE html>
<!--
  Based on the Google Cloud Open Knowledge Format reference viewer (Apache-2.0).
  wirenet changes are limited to branding, safe Markdown rendering, local serving,
  and exclusion of index.md, log.md, and AGENTS.md from the generated bundle.
  See LICENSES/Apache-2.0.txt and THIRD_PARTY_NOTICES.md in the plugin.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data:; connect-src 'none'; base-uri 'none'; object-src 'none'; form-action 'none'">
<title>wirenet Inspector</title>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
:root {
  --ink: #262626;
  --muted: #707070;
  --line: #e4e4e1;
  --soft: #f6f6f3;
  --accent: #ff5c1a;
  --white: #fff;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  color: var(--ink);
  background: #f8f8f6;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
}
header.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.title {
  display: flex;
  align-items: center;
  min-width: max-content;
}
.brand-mark { width: 20px; height: 20px; margin-right: 9px; }
.title strong { margin-right: 8px; font-size: 16px; }
.muted { color: var(--muted); font-size: 12px; }
.bundle-name { margin-right: 8px; }
.controls { display: flex; gap: 8px; }
.controls input, .controls select, .controls button {
  padding: 5px 8px;
  border: 1px solid #c9c9c5;
  border-radius: 4px;
  background: var(--white);
  color: var(--ink);
  font: inherit;
  font-size: 13px;
}
.controls input { width: 220px; }
.controls button { cursor: pointer; background: var(--soft); }
.controls button:hover { background: #ecece8; }
.controls :focus-visible { outline: 2px solid rgba(255, 92, 26, .28); outline-offset: 1px; }
main {
  display: flex;
  flex: 1;
  min-height: 0;
}
#graph {
  flex: 1 1 60%;
  min-width: 0;
  position: relative;
  background: var(--white);
  border-right: 1px solid var(--line);
}
#detail {
  flex: 0 0 40%;
  overflow-y: auto;
  padding: 18px 22px;
  background: var(--white);
}
#detail-empty, #load-error {
  margin-top: 40px;
  text-align: center;
}
#load-error { color: #9b2c2c; }
.detail-header { margin-bottom: 12px; }
.detail-header h1 {
  margin: 4px 0 2px;
  font-size: 18px;
  font-weight: 600;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  color: var(--white);
  background: #8a8a8a;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
}
dl.frontmatter {
  display: grid;
  grid-template-columns: 90px 1fr;
  column-gap: 12px;
  row-gap: 4px;
  margin: 8px 0 12px;
  font-size: 13px;
}
dl.frontmatter dt { color: var(--muted); font-weight: 500; }
dl.frontmatter dd { margin: 0; min-width: 0; word-break: break-word; }
dl.frontmatter a { color: var(--accent); word-break: break-all; }
.tag {
  display: inline-block;
  margin: 0 4px 2px 0;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--soft);
  color: #525252;
  font-size: 11px;
}
hr { margin: 14px 0; border: 0; border-top: 1px solid var(--line); }
#detail-body { font-size: 13px; line-height: 1.55; }
#detail-body h1 {
  margin: 18px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line);
  font-size: 16px;
}
#detail-body h2 { margin: 14px 0 4px; font-size: 14px; }
#detail-body h3 { margin: 12px 0 4px; font-size: 13px; }
#detail-body p { margin: 6px 0; }
#detail-body code {
  padding: 1px 4px;
  border-radius: 3px;
  background: var(--soft);
  font-family: ui-monospace, "SF Mono", Consolas, monospace;
  font-size: 12px;
}
#detail-body pre {
  overflow-x: auto;
  padding: 10px 12px;
  border-radius: 6px;
  background: var(--ink);
  color: #e8e8e8;
  font-size: 12px;
}
#detail-body pre code { padding: 0; background: transparent; color: inherit; }
#detail-body ul, #detail-body ol { margin: 6px 0; padding-left: 22px; }
#detail-body li { margin: 2px 0; }
#detail-body table { margin: 8px 0; border-collapse: collapse; }
#detail-body th, #detail-body td {
  padding: 4px 8px;
  border: 1px solid var(--line);
  font-size: 12px;
}
#detail-body a { color: var(--accent); }
#detail-body a.internal { cursor: pointer; }
#detail-backlinks { margin-top: 18px; }
#detail-backlinks h2 { margin-bottom: 6px; color: var(--muted); font-size: 13px; }
#detail-backlinks ul { padding-left: 18px; }
#detail-backlinks a { color: var(--accent); cursor: pointer; }
@media (max-width: 900px) {
  header.app-header { align-items: flex-start; flex-direction: column; }
  .controls { width: 100%; flex-wrap: wrap; }
  .controls input { flex: 1 1 200px; width: auto; }
  main { flex-direction: column; }
  #graph { flex: 0 0 48vh; border-right: 0; border-bottom: 1px solid var(--line); }
  #detail { flex: 1 1 auto; }
}
</style>
</head>
<body>
<header class="app-header">
  <div class="title">
    <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9.5"></circle>
      <ellipse cx="12" cy="12" rx="4" ry="9.5"></ellipse>
      <ellipse cx="12" cy="12" rx="9.5" ry="4"></ellipse>
    </svg>
    <strong>wirenet Inspector</strong>
    <span class="bundle-name" id="bundle-name"></span>
    <span class="muted">OKF bundle</span>
  </div>
  <div class="controls" aria-label="Inspector controls">
    <input id="search" type="search" placeholder="Search title / id / tag" aria-label="Search concepts">
    <select id="filter-type" aria-label="Filter concepts by type">
      <option value="">All types</option>
    </select>
    <select id="layout" aria-label="Graph layout">
      <option value="cose">cose (force)</option>
      <option value="concentric">concentric</option>
      <option value="breadthfirst">breadth-first</option>
      <option value="circle">circle</option>
      <option value="grid">grid</option>
    </select>
    <button id="reset" type="button">Reset view</button>
  </div>
</header>

<main>
  <section id="graph" aria-label="OKF knowledge graph"></section>
  <section id="detail" aria-live="polite">
    <div id="load-error" hidden></div>
    <div id="detail-empty" class="muted">Click a node to see its details.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="muted" id="detail-id"></div>
      </header>
      <dl class="frontmatter">
        <dt>Description</dt><dd id="detail-description"></dd>
        <dt>Resource</dt><dd id="detail-resource"></dd>
        <dt>Tags</dt><dd id="detail-tags"></dd>
      </dl>
      <hr>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Cited by</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = __BUNDLE_NAME__;
window.BUNDLE = __BUNDLE_DATA__;
</script>
<script>
(function () {
  "use strict";

  const bundle = window.BUNDLE || { nodes: [], edges: [], bodies: {}, types: [] };
  const bundleName = window.BUNDLE_NAME || "Manager";
  document.title = `wirenet Inspector — ${bundleName}`;
  document.getElementById("bundle-name").textContent = bundleName;

  const loadError = document.getElementById("load-error");
  if (!window.cytoscape || !window.marked || !window.DOMPurify) {
    loadError.hidden = false;
    loadError.textContent = "The Inspector libraries could not be loaded. Check the network connection and reload.";
    document.getElementById("detail-empty").hidden = true;
    return;
  }

  const typeSelect = document.getElementById("filter-type");
  for (const type of bundle.types) {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeSelect.appendChild(option);
  }

  const backlinks = {};
  for (const edge of bundle.edges) {
    const { source, target } = edge.data;
    (backlinks[target] ||= []).push(source);
  }

  const nodeIndex = {};
  for (const node of bundle.nodes) nodeIndex[node.data.id] = node.data;

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "color": "#262626",
          "font-size": 11,
          "text-valign": "bottom",
          "text-margin-y": 4,
          "text-wrap": "wrap",
          "text-max-width": 120,
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#262626"
        }
      },
      {
        selector: "node:selected",
        style: { "border-width": 3, "border-color": "#ff5c1a" }
      },
      {
        selector: "edge",
        style: {
          "width": 1.5,
          "line-color": "#c9c9c5",
          "target-arrow-color": "#c9c9c5",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": .9
        }
      },
      {
        selector: "edge:selected",
        style: {
          "line-color": "#ff5c1a",
          "target-arrow-color": "#ff5c1a",
          "width": 2.5
        }
      },
      { selector: ".dim", style: { "opacity": .15 } }
    ],
    layout: { name: "cose", animate: false, padding: 30 }
  });

  cy.on("tap", "node", event => showDetail(event.target.id()));
  cy.on("tap", event => {
    if (event.target === cy) clearSelection();
  });

  document.getElementById("layout").addEventListener("change", event => {
    cy.layout({ name: event.target.value, animate: false, padding: 30 }).run();
  });

  document.getElementById("reset").addEventListener("click", () => {
    cy.fit(null, 30);
    clearSelection();
  });

  document.getElementById("search").addEventListener("input", event => {
    const query = event.target.value.trim().toLowerCase();
    if (!query) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach(node => {
      const data = node.data();
      const haystack = `${data.label || ""} ${data.id} ${(data.tags || []).join(" ")}`.toLowerCase();
      node.toggleClass("dim", !haystack.includes(query));
    });
    cy.edges().forEach(edge => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  typeSelect.addEventListener("change", event => {
    const type = event.target.value;
    if (!type) {
      cy.elements().removeClass("dim");
      return;
    }
    cy.nodes().forEach(node => {
      node.toggleClass("dim", node.data("type") !== type);
    });
    cy.edges().forEach(edge => {
      edge.toggleClass("dim", edge.source().hasClass("dim") || edge.target().hasClass("dim"));
    });
  });

  function clearSelection() {
    cy.elements().unselect();
    document.getElementById("detail-empty").hidden = false;
    document.getElementById("detail-content").hidden = true;
  }

  function showDetail(conceptId) {
    const data = nodeIndex[conceptId];
    if (!data) return;
    cy.elements().unselect();
    const node = cy.getElementById(conceptId);
    node.select();

    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail-content").hidden = false;

    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.background = data.color;
    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-id").textContent = conceptId;
    document.getElementById("detail-description").textContent = data.description || "—";

    const resource = document.getElementById("detail-resource");
    resource.replaceChildren();
    if (/^https?:\/\//i.test(data.resource || "")) {
      const link = document.createElement("a");
      link.href = data.resource;
      link.textContent = data.resource;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      resource.appendChild(link);
    } else {
      resource.textContent = data.resource || "—";
    }

    const tags = document.getElementById("detail-tags");
    tags.replaceChildren();
    if (data.tags && data.tags.length) {
      for (const value of data.tags) {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = value;
        tags.appendChild(tag);
      }
    } else {
      tags.textContent = "—";
    }

    const body = document.getElementById("detail-body");
    body.innerHTML = DOMPurify.sanitize(marked.parse(bundle.bodies[conceptId] || ""));
    rewriteInternalLinks(body);

    const sources = backlinks[conceptId] || [];
    const backlinkSection = document.getElementById("detail-backlinks");
    const backlinkList = document.getElementById("backlinks-list");
    backlinkList.replaceChildren();
    backlinkSection.hidden = sources.length === 0;
    for (const source of sources) {
      const item = document.createElement("li");
      const link = document.createElement("a");
      link.textContent = nodeIndex[source]?.label || source;
      link.addEventListener("click", () => showDetail(source));
      item.appendChild(link);
      const muted = document.createElement("span");
      muted.className = "muted";
      muted.textContent = ` (${source})`;
      item.appendChild(muted);
      backlinkList.appendChild(item);
    }

    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1) }, { duration: 200 });
  }

  function rewriteInternalLinks(root) {
    root.querySelectorAll("a[href]").forEach(link => {
      const href = link.getAttribute("href");
      if (!href) return;
      if (href.startsWith("/") && /\.md(?:#|$)/i.test(href)) {
        const target = decodeURIComponent(href.slice(1).split("#", 1)[0]).replace(/\.md$/i, "");
        if (nodeIndex[target]) {
          link.className = "internal";
          link.href = "#";
          link.addEventListener("click", event => {
            event.preventDefault();
            showDetail(target);
          });
          return;
        }
      }
      if (/^https?:\/\//i.test(href)) {
        link.className = "external";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
      } else if (!href.startsWith("#") && !href.startsWith("mailto:")) {
        link.removeAttribute("href");
      }
    });
  }

  const initial = bundle.nodes.find(node => node.data.type === "Manager Overview") || bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
}());
</script>
</body>
</html>
