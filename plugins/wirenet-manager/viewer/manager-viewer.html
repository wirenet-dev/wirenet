<!DOCTYPE html>
<!--
  Based on the Google Cloud Open Knowledge Format viewer (Apache-2.0).
  Modified by WireNet for a read-only local Manager view.
  See LICENSES/Apache-2.0.txt and THIRD_PARTY_NOTICES.md in the plugin.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src data:; connect-src 'none'; base-uri 'none'; object-src 'none'; form-action 'none'">
<title>WireNet Manager</title>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script referrerpolicy="no-referrer" src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
:root {
  --ink: #262626;
  --muted: #707070;
  --line: #e4e4e1;
  --soft: #f6f6f3;
  --accent: #ff5c1a;
  --white: #fff;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  color: var(--ink);
  background: var(--white);
  font: 14px/1.5 "Helvetica Neue", Arial, sans-serif;
}
button, input, select { font: inherit; }
.app-header {
  min-height: 60px;
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
}
.brand, .controls { display: flex; align-items: center; }
.brand { gap: 10px; min-width: max-content; }
.brand-mark { width: 21px; height: 21px; }
.wordmark, .read-only, .detail-path, .type-chip {
  font-family: "SFMono-Regular", Consolas, monospace;
}
.wordmark { font-size: 17px; font-weight: 650; }
.product-name {
  padding-left: 10px;
  border-left: 1px solid var(--line);
  color: var(--muted);
}
.read-only {
  color: var(--accent);
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.controls { justify-content: flex-end; gap: 7px; flex-wrap: wrap; }
.controls input, .controls select, .controls button, .toggle {
  min-height: 34px;
  border: 1px solid #d1d1ce;
  border-radius: 4px;
  background: var(--white);
  color: var(--ink);
}
.controls input, .controls select { padding: 0 9px; }
.controls input { width: min(220px, 24vw); }
.controls button { padding: 0 10px; cursor: pointer; }
.controls button:hover { border-color: var(--ink); }
.controls :focus-visible { outline: 2px solid rgba(255, 92, 26, .25); outline-offset: 1px; }
.toggle { display: flex; align-items: center; gap: 6px; padding: 0 9px; cursor: pointer; }
.toggle input { width: auto; min-height: 0; margin: 0; accent-color: var(--accent); }
main { min-height: 0; flex: 1 1 auto; display: flex; }
#graph {
  flex: 1 1 60%;
  min-width: 0;
  border-right: 1px solid var(--line);
  background:
    linear-gradient(rgba(38, 38, 38, .025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(38, 38, 38, .025) 1px, transparent 1px),
    var(--white);
  background-size: 28px 28px;
}
#detail {
  flex: 0 0 40%;
  min-width: 340px;
  overflow-y: auto;
  padding: 26px 30px 42px;
}
body.reading-mode #graph { display: none; }
body.reading-mode #detail { flex: 1 1 auto; min-width: 0; }
body.reading-mode #detail-content,
body.reading-mode #detail-empty,
body.reading-mode #load-error { width: min(100%, 820px); margin-left: auto; margin-right: auto; }
#detail-empty, #load-error {
  max-width: 380px;
  margin: 18vh auto 0;
  color: var(--muted);
}
#load-error { color: #9b2c2c; }
.detail-header { margin-bottom: 18px; }
.type-chip {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 999px;
  color: var(--white);
  font-size: 10px;
  letter-spacing: .03em;
}
.detail-header h1 { margin: 9px 0 5px; font-size: clamp(24px, 3vw, 36px); line-height: 1.08; }
.detail-path { color: var(--muted); font-size: 11px; word-break: break-word; }
.frontmatter {
  display: grid;
  grid-template-columns: minmax(76px, 104px) 1fr;
  gap: 6px 14px;
  margin: 0 0 20px;
  padding: 13px 0;
  border-block: 1px solid var(--line);
  font-size: 12px;
}
.frontmatter:empty { display: none; }
.frontmatter dt { color: var(--muted); }
.frontmatter dd { min-width: 0; margin: 0; word-break: break-word; }
.frontmatter a, #detail-body a, #detail-backlinks a {
  color: var(--ink);
  text-decoration-color: var(--accent);
  text-underline-offset: 2px;
}
.tag {
  display: inline-block;
  margin: 0 4px 4px 0;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--soft);
  font: 10px "SFMono-Regular", Consolas, monospace;
}
#detail-body { max-width: 76ch; line-height: 1.64; }
#detail-body h1, #detail-body h2, #detail-body h3 { line-height: 1.2; }
#detail-body h1 { margin: 28px 0 10px; font-size: 24px; }
#detail-body h2 { margin: 25px 0 8px; font-size: 18px; }
#detail-body h3 { margin: 20px 0 7px; font-size: 15px; }
#detail-body p { margin: 8px 0 12px; }
#detail-body ul, #detail-body ol { margin: 8px 0 14px; padding-left: 24px; }
#detail-body li { margin: 4px 0; }
#detail-body blockquote { margin: 14px 0; padding-left: 14px; border-left: 3px solid var(--accent); color: #555; }
#detail-body code {
  padding: 1px 4px;
  border-radius: 3px;
  background: var(--soft);
  font: .88em "SFMono-Regular", Consolas, monospace;
}
#detail-body pre { overflow-x: auto; padding: 13px 15px; border-radius: 4px; background: var(--ink); color: #f5f5f5; }
#detail-body pre code { padding: 0; background: transparent; color: inherit; }
#detail-body table { width: 100%; margin: 15px 0; border-collapse: collapse; font-size: 12px; }
#detail-body th, #detail-body td { padding: 7px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
#detail-body th { background: var(--soft); }
#detail-body hr { margin: 24px 0; border: 0; border-top: 1px solid var(--line); }
#detail-body input[type="checkbox"] { accent-color: var(--accent); }
#detail-backlinks { margin-top: 30px; padding-top: 16px; border-top: 1px solid var(--line); }
#detail-backlinks h2 { margin: 0 0 9px; color: var(--muted); font-size: 12px; font-weight: 500; }
#detail-backlinks ul { margin: 0; padding: 0; list-style: none; }
#detail-backlinks li { margin: 5px 0; }
#detail-backlinks a { cursor: pointer; }
@media (max-width: 980px) {
  .app-header { align-items: flex-start; flex-direction: column; gap: 9px; }
  .controls { width: 100%; justify-content: flex-start; }
  .controls input { flex: 1 1 180px; width: auto; }
  main { flex-direction: column; }
  #graph { flex: 0 0 44vh; border-right: 0; border-bottom: 1px solid var(--line); }
  #detail { flex: 1 1 auto; min-width: 0; padding: 22px 20px 36px; }
}
</style>
</head>
<body>
<header class="app-header">
  <div class="brand" aria-label="WireNet Manager">
    <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9.5"></circle>
      <ellipse cx="12" cy="12" rx="4" ry="9.5"></ellipse>
      <ellipse cx="12" cy="12" rx="9.5" ry="4"></ellipse>
    </svg>
    <span class="wordmark">wirenet</span>
    <span class="product-name" id="bundle-name"></span>
    <span class="read-only">read only</span>
  </div>
  <div class="controls" aria-label="Viewer controls">
    <input id="search" type="search" placeholder="Search graph" aria-label="Search graph">
    <select id="filter-type" aria-label="Filter graph by type">
      <option value="">All types</option>
    </select>
    <select id="layout" aria-label="Graph layout">
      <option value="cose">Connected</option>
      <option value="breadthfirst">Hierarchy</option>
      <option value="concentric">Concentric</option>
      <option value="circle">Circle</option>
      <option value="grid">Grid</option>
    </select>
    <label class="toggle"><input id="show-agent" type="checkbox"> Agent instructions</label>
    <button id="reading-mode" type="button">Reading view</button>
    <button id="reset" type="button">Reset</button>
  </div>
</header>

<main>
  <section id="graph" aria-label="OKF knowledge graph"></section>
  <section id="detail" aria-live="polite">
    <div id="load-error" hidden></div>
    <div id="detail-empty">No Manager documents are ready yet.</div>
    <article id="detail-content" hidden>
      <header class="detail-header">
        <span class="type-chip" id="detail-type"></span>
        <h1 id="detail-title"></h1>
        <div class="detail-path" id="detail-path"></div>
      </header>
      <dl class="frontmatter" id="detail-meta"></dl>
      <div id="detail-body"></div>
      <section id="detail-backlinks" hidden>
        <h2>Linked from</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>
</main>

<script>
window.BUNDLE_NAME = __BUNDLE_NAME__;
window.BUNDLE = __BUNDLE_DATA__;
</script>
<script>
(function () {
  "use strict";

  const bundle = window.BUNDLE || { nodes: [], edges: [], bodies: {}, types: [] };
  const name = window.BUNDLE_NAME || "Manager";
  const byId = Object.fromEntries(bundle.nodes.map(node => [node.data.id, node.data]));
  const backlinks = {};
  let selectedId = "";

  document.title = `WireNet Manager — ${name}`;
  document.getElementById("bundle-name").textContent = name;

  for (const edge of bundle.edges) {
    if (edge.data.kind !== "link") continue;
    (backlinks[edge.data.target] ||= []).push(edge.data.source);
  }

  if (!window.cytoscape || !window.marked || !window.DOMPurify) {
    const error = document.getElementById("load-error");
    error.hidden = false;
    error.textContent = "The viewer libraries could not be loaded. Check the network connection and reload.";
    document.getElementById("detail-empty").hidden = true;
    return;
  }

  const search = document.getElementById("search");
  const typeFilter = document.getElementById("filter-type");
  const layoutSelect = document.getElementById("layout");
  const showAgent = document.getElementById("show-agent");
  const readingMode = document.getElementById("reading-mode");

  for (const type of bundle.types) {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeFilter.appendChild(option);
  }

  const cy = cytoscape({
    container: document.getElementById("graph"),
    elements: [...bundle.nodes, ...bundle.edges],
    style: [
      {
        selector: "node",
        style: {
          "background-color": "data(color)",
          "label": "data(label)",
          "width": "data(size)",
          "height": "data(size)",
          "border-width": 1,
          "border-color": "#262626",
          "color": "#262626",
          "font-size": 9,
          "font-weight": 500,
          "text-valign": "bottom",
          "text-margin-y": 5,
          "text-wrap": "wrap",
          "text-max-width": 105,
          "text-background-color": "#fff",
          "text-background-opacity": .82,
          "text-background-padding": 2
        }
      },
      { selector: "node:selected", style: { "border-width": 4, "border-color": "#ff5c1a" } },
      {
        selector: "edge",
        style: {
          "width": 1.25,
          "line-color": "#c7c7c7",
          "target-arrow-color": "#c7c7c7",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": .75
        }
      },
      {
        selector: "edge[kind = 'routing']",
        style: {
          "line-style": "dashed",
          "line-color": "#ff5c1a",
          "target-arrow-color": "#ff5c1a"
        }
      },
      { selector: ".dimmed", style: { "opacity": .14 } },
      { selector: ".filtered-out", style: { "display": "none" } }
    ],
    layout: { name: "cose", animate: false, fit: true, padding: 36 }
  });

  function isAgent(data) {
    return data && data.audience === "agent";
  }

  function runLayout() {
    cy.layout({ name: layoutSelect.value, animate: false, fit: true, padding: 36 }).run();
  }

  function applyFilters() {
    const query = search.value.trim().toLowerCase();
    const type = typeFilter.value;
    cy.batch(() => {
      cy.elements().removeClass("dimmed filtered-out");
      cy.nodes().forEach(node => {
        const data = node.data();
        if (!showAgent.checked && isAgent(data)) {
          node.addClass("filtered-out");
          return;
        }
        const haystack = `${data.label} ${data.path} ${data.description || ""}`.toLowerCase();
        if ((query && !haystack.includes(query)) || (type && data.type !== type)) {
          node.addClass("dimmed");
        }
      });
      cy.edges().forEach(edge => {
        if (edge.source().hasClass("filtered-out") || edge.target().hasClass("filtered-out")) {
          edge.addClass("filtered-out");
        } else if (edge.source().hasClass("dimmed") || edge.target().hasClass("dimmed")) {
          edge.addClass("dimmed");
        }
      });
    });
  }

  function appendMeta(term, value, render) {
    if (!value || (Array.isArray(value) && value.length === 0)) return;
    const list = document.getElementById("detail-meta");
    const dt = document.createElement("dt");
    const dd = document.createElement("dd");
    dt.textContent = term;
    render(dd, value);
    list.append(dt, dd);
  }

  function renderMarkdown(id) {
    const body = document.getElementById("detail-body");
    body.innerHTML = DOMPurify.sanitize(marked.parse(bundle.bodies[id] || ""));
    body.querySelectorAll("a").forEach(anchor => {
      const href = anchor.getAttribute("href") || "";
      if (href.startsWith("/") && /\.md(?:#|$)/i.test(href)) {
        const target = decodeURIComponent(href.slice(1).split("#", 1)[0]).replace(/\.md$/i, "");
        if (byId[target]) {
          anchor.addEventListener("click", event => {
            event.preventDefault();
            showDetail(target);
          });
        } else {
          anchor.removeAttribute("href");
        }
      } else if (/^https?:\/\//i.test(href)) {
        anchor.target = "_blank";
        anchor.rel = "noopener noreferrer";
      } else if (!href.startsWith("#") && !href.startsWith("mailto:")) {
        anchor.removeAttribute("href");
      }
    });
  }

  function renderBacklinks(id) {
    const section = document.getElementById("detail-backlinks");
    const list = document.getElementById("backlinks-list");
    list.replaceChildren();
    const sources = (backlinks[id] || []).filter(source => showAgent.checked || !isAgent(byId[source]));
    section.hidden = sources.length === 0;
    for (const source of sources) {
      const item = document.createElement("li");
      const link = document.createElement("a");
      link.textContent = byId[source]?.label || source;
      link.href = `#${encodeURIComponent(source)}`;
      link.addEventListener("click", event => {
        event.preventDefault();
        showDetail(source);
      });
      item.appendChild(link);
      list.appendChild(item);
    }
  }

  function showDetail(id) {
    const data = byId[id];
    if (!data) return;
    if (isAgent(data) && !showAgent.checked) {
      showAgent.checked = true;
      applyFilters();
      runLayout();
    }
    selectedId = id;
    document.getElementById("detail-empty").hidden = true;
    document.getElementById("detail-content").hidden = false;
    const chip = document.getElementById("detail-type");
    chip.textContent = data.type;
    chip.style.backgroundColor = data.color;
    document.getElementById("detail-title").textContent = data.label;
    document.getElementById("detail-path").textContent = data.path;
    document.getElementById("detail-meta").replaceChildren();
    appendMeta("Description", data.description, (element, value) => { element.textContent = value; });
    appendMeta("Resource", data.resource, (element, value) => {
      if (/^https?:\/\//i.test(value)) {
        const link = document.createElement("a");
        link.href = value;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = value;
        element.appendChild(link);
      } else {
        element.textContent = value;
      }
    });
    appendMeta("Tags", data.tags, (element, values) => {
      for (const value of values) {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = value;
        element.appendChild(tag);
      }
    });
    renderMarkdown(id);
    renderBacklinks(id);
    cy.$id(id).select();
    document.getElementById("detail").scrollTop = 0;
  }

  cy.on("tap", "node", event => showDetail(event.target.id()));
  search.addEventListener("input", applyFilters);
  typeFilter.addEventListener("change", applyFilters);
  layoutSelect.addEventListener("change", runLayout);
  showAgent.addEventListener("change", () => {
    applyFilters();
    if (!showAgent.checked && isAgent(byId[selectedId])) {
      const fallback = bundle.nodes.find(node => !isAgent(node.data));
      if (fallback) showDetail(fallback.data.id);
    }
    runLayout();
  });
  readingMode.addEventListener("click", () => {
    const enabled = document.body.classList.toggle("reading-mode");
    readingMode.textContent = enabled ? "Graph view" : "Reading view";
    if (!enabled) {
      cy.resize();
      cy.fit(undefined, 36);
    }
  });
  document.getElementById("reset").addEventListener("click", () => {
    search.value = "";
    typeFilter.value = "";
    applyFilters();
    cy.fit(undefined, 36);
  });

  applyFilters();
  runLayout();
  const initial = bundle.nodes.find(node => node.data.type === "Manager Overview" && !isAgent(node.data))
    || bundle.nodes.find(node => node.data.type === "Project Status" && !isAgent(node.data))
    || bundle.nodes.find(node => !isAgent(node.data))
    || bundle.nodes[0];
  if (initial) showDetail(initial.data.id);
}());
</script>
</body>
</html>
