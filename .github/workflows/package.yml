name: Validate WireNet Manager

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Validate Markdown
        run: python3 scripts/validate_markdown.py .

      - name: Validate plugin JSON
        run: |
          python3 -m json.tool plugins/wirenet-manager/.codex-plugin/plugin.json >/dev/null
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null

      - name: Run tests
        run: pytest -q

      - name: Check generated drift
        run: git diff --check
