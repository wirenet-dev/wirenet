name: Validate WireNet Manager

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Validate Markdown
        run: python3 scripts/validate_markdown.py .

      - name: Validate plugin JSON
        run: |
          python3 -m json.tool plugins/wirenet/.codex-plugin/plugin.json >/dev/null
          python3 -m json.tool plugins/wirenet/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null

      - name: Run tests
        run: pytest -q

      - name: Check generated drift
        run: git diff --check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify tag matches Manager manifest
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path("plugins/wirenet/.codex-plugin/plugin.json").read_text()
          )
          expected = f"v{manifest['version']}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"tag {actual} does not match wirenet {expected}")
          PY

      - name: Prepare user-facing release notes
        run: |
          awk '
            NR == 1 && $0 == "---" { frontmatter = 1; next }
            frontmatter && $0 == "---" { frontmatter = 0; next }
            !frontmatter { print }
          ' plugins/wirenet/RELEASE_NOTES.md > /tmp/wirenet-release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "wirenet ${GITHUB_REF_NAME}" \
              --notes-file /tmp/wirenet-release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "wirenet ${GITHUB_REF_NAME}" \
              --notes-file /tmp/wirenet-release-notes.md
          fi
